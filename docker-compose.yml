version: "3.9"

services:

  api:
    build: .
    container_name: meeting-memory-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: python:3.11-slim
    container_name: meeting-memory-ui
    working_dir: /app
    command: >
      sh -c "pip install streamlit httpx &&
             streamlit run frontend/app.py
             --server.port 8501
             --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - API_BASE=http://api:8000
    depends_on:
      - api
    restart: unless-stopped