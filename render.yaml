services:
  - type: web
    name: meeting-memory-engine
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      pip install langchain-groq langchain-huggingface sentence-transformers slowapi loguru pymupdf python-docx rank-bm25
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health